name: Auto Job Crawler

on:
  schedule:
    - cron: '0 0 * * *'   # KST 오전 9시 (전체 사이트)
  workflow_dispatch:        # GitHub Actions 탭에서 수동 실행 가능 (테스트용)
    inputs:
      region_mode:
        description: '지역 모드 (weekend / weekday / 비워두면 요일 자동 감지)'
        required: false
        default: ''

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt beautifulsoup4

      - name: 크롤러 실행
        run: python crawler.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
          CRAWL_REGION_MODE: ${{ github.event.inputs.region_mode }}
