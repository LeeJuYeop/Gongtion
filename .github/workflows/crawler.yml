name: Auto Job Crawler

on:
  schedule:
    - cron: '0 0 * * *'   # KST 오전 9시 (원티드 + 직행)
    - cron: '0 9 * * *'   # KST 오후 6시 (사람인 + 잡코리아)
  workflow_dispatch:        # GitHub Actions 탭에서 수동 실행 가능 (테스트용)
    inputs:
      crawl_mode:
        description: '크롤링 모드 (morning / evening / 비워두면 전체)'
        required: false
        default: ''

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt beautifulsoup4

      - name: 크롤링 모드 결정
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.crawl_mode }}" ]; then
            echo "CRAWL_MODE=${{ github.event.inputs.crawl_mode }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
            echo "CRAWL_MODE=morning" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 9 * * *" ]; then
            echo "CRAWL_MODE=evening" >> $GITHUB_ENV
          fi

      - name: 크롤러 실행
        run: python crawler.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
          CRAWL_MODE: ${{ env.CRAWL_MODE }}
